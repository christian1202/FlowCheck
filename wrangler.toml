name = "flowcheck"
compatibility_date = "2024-04-05"
compatibility_flags = ["nodejs_compat"]

# pages_build_output_dir = ".open-next/worker"

[placement]
mode = "smart"

[[queues.producers]]
queue = "flowcheck-sheets-sync"
binding = "SHEETS_SYNC_QUEUE"

[[queues.consumers]]
queue = "flowcheck-sheets-sync"
max_batch_size = 50
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "flowcheck-sheets-sync-dlq"

[triggers]
crons = ["*/2 * * * *"] # Every 2 minutes for sheet sync and email retries
